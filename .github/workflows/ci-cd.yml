name: Task Manager CI/CD

on:
  push:
    branches: [main]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install backend dependencies
        working-directory: ./backend
        run: npm install
      - name: Run backend Jest tests
        working-directory: ./backend
        run: npm test

  frontend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm install
      - name: Run frontend Jest tests
        working-directory: ./frontend
        run: npm test -- --watchAll=false

  e2e-tests:
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests]
    steps:
      - uses: actions/checkout@v4

      - name: Create .env file
        run: |
          echo "DB_USER=admin" >> .env
          echo "DB_PASSWORD=password" >> .env
          echo "DB_NAME=taskmanager" >> .env

      - name: Start full stack with Docker Compose
        run: docker compose up --build -d

      - name: Wait for backend to be ready
        run: |
          for i in {1..15}; do
            curl -sf http://localhost:4000/api/tasks && break
            echo "Waiting for backend..."
            sleep 3
          done

      - name: Install Cypress and dependencies
        working-directory: ./frontend
        run: npm install

      - name: Run Cypress tests
        working-directory: ./frontend
        run: npx cypress run --config baseUrl=http://localhost:3000

      - name: Dump logs on failure
        if: failure()
        run: docker compose logs

      - name: Tear down
        if: always()
        run: docker compose down -v

  build-and-push:
    runs-on: ubuntu-latest
    needs: [e2e-tests]
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        run: echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Set lowercase repo name
        run: echo "IMAGE_BASE=$(echo ghcr.io/${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Build backend image
        run: docker build -t ${{ env.IMAGE_BASE }}-backend:latest ./backend

      - name: Build frontend image
        run: docker build -t ${{ env.IMAGE_BASE }}-frontend:latest ./frontend

      - name: Push backend image
        run: docker push ${{ env.IMAGE_BASE }}-backend:latest

      - name: Push frontend image
        run: docker push ${{ env.IMAGE_BASE }}-frontend:latest